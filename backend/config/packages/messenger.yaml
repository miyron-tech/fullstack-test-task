framework:
    messenger:
        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 0
            sync: 'sync://'

        routing:
            'App\Message\MerchantNotification': async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
